<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Mono:wght@300;400;500&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    position: relative;
    background:
      radial-gradient(circle at 78% 28%, rgba(0,191,255,0.16), transparent 42%),
      radial-gradient(circle at 12% 90%, rgba(59,130,246,0.10), transparent 45%),
      #080B14;
    color: #E2E8F0;
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
  }
  .traces { position: absolute; inset: 0; }
  .frame {
    position: absolute; inset: 28px;
    border: 1px solid rgba(0,191,255,0.18);
  }
  .content {
    position: absolute;
    left: 92px; top: 0; bottom: 0;
    display: flex; flex-direction: column; justify-content: center;
    max-width: 820px;
  }
  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 22px; font-weight: 400;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: #00BFFF;
    margin-bottom: 26px;
  }
  .tag .slash { color: #0088B3; }
  .name {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 132px; line-height: 0.96; font-weight: 400;
    letter-spacing: 0.5px;
  }
  .name .last { color: #00BFFF; }
  .divider {
    width: 120px; height: 2px; margin: 38px 0 32px;
    background: linear-gradient(90deg, #00BFFF, rgba(0,191,255,0));
  }
  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 23px; font-weight: 300;
    color: #8492A6; letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .subtitle b { color: #E2E8F0; font-weight: 400; }
  .url {
    position: absolute; left: 92px; bottom: 64px;
    font-family: 'DM Mono', monospace;
    font-size: 20px; color: #4A5568; letter-spacing: 0.04em;
  }
  .node { position: absolute; }
</style>
</head>
<body>
  <svg class="traces" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M740 90 L920 90 L920 250 L1080 250" stroke="rgba(0,191,255,0.18)" stroke-width="1.5"/>
    <path d="M860 0 L860 160 L1010 160 L1010 430" stroke="rgba(0,191,255,0.12)" stroke-width="1.5"/>
    <path d="M1120 300 L1120 540 L980 540" stroke="rgba(0,191,255,0.10)" stroke-width="1.5"/>
    <path d="M700 560 L820 560 L820 460 L1040 460" stroke="rgba(0,191,255,0.10)" stroke-width="1.5"/>
    <circle cx="920" cy="90" r="4" fill="rgba(0,191,255,0.55)"/>
    <circle cx="920" cy="250" r="4" fill="rgba(0,191,255,0.40)"/>
    <circle cx="1010" cy="160" r="4" fill="rgba(0,191,255,0.40)"/>
    <circle cx="860" cy="160" r="4" fill="rgba(0,191,255,0.30)"/>
    <circle cx="820" cy="460" r="4" fill="rgba(0,191,255,0.30)"/>
  </svg>
  <div class="frame"></div>
  <div class="content">
    <div class="tag"><span class="slash">//</span> Electrical &amp; Computer Engineer</div>
    <div class="name">Nikolas<br><span class="last">Neofytou</span></div>
    <div class="divider"></div>
    <div class="subtitle"><b>NTUA</b> · Electronics · Control · Embedded · Full-stack</div>
  </div>
  <div class="url">nikolasneofytou.github.io/personal-website</div>
</body>
</html>
